# ════════════════════════════════════════════════════════════════════════════════════════
# V17.30 — STEP-MATCHED CONTROL for the homogeneity lever ablations (NO new lever).
#
# WHY THIS EXISTS: every lever arm (v17.2 flatness, v17.3 inv+explain, v17.31 inv-only) resumes
# from v17@50k and fine-tunes ~1.25k extra steps. Comparing those against the raw v17@50k ckpt
# would conflate the LEVER with the +1.25k EXTRA TRAINING STEPS. This arm isolates the latter:
# identical resume, identical data mix, identical lr / horizon / schedule — but ALL new lever
# lambdas = 0. It is "v17@50k, just trained 1.25k steps longer on the same objective."
#
# HOW TO USE IT:
#   • Ablation TABLE: report each lever as (lever_arm − v17.30), both @51.25k, identical except
#     the one lever → clean single-variable attribution (fixes the step confound).
#   • KILL-GATE: still gate against v17@50k (the shipped model we must not regress) — that
#     comparison is intentionally conservative.
# If v17.30 itself drifts materially from v17@50k, that drift (not the lever) explains part of any
# lever delta measured against the raw ckpt — which is exactly why this control is needed.
#
# RUN (saves to checkpoints/v17_30/, resumes FROM the row-4 50k weights):
#   bash scripts/train.sh --version 17.30 --cuda 0 \
#       --resume checkpoints/v17_row4/checkpoint_iter_50000.pth
#
# Inherits ALL of v17.yaml via `extends`; the train block mirrors the lever arms EXACTLY so the
# only difference between this control and any lever arm is that arm's lambda.
# ════════════════════════════════════════════════════════════════════════════════════════
extends: 17

train:
  lr: 2.0e-5
  use_cosine_lr: false
  # POST-MORTEM 2026-07-02: the banked 60k run MEASURABLY trained with fresh Adam @ constant
  # 2e-5 (ckpt optimizer lr = 2e-5, vs base@50k's annealed 1e-7). false/false here would NOT
  # reproduce it: this arch matches base@50k, so the optimizer state would load and bring the
  # frozen 1e-7 lr with it. Values below aligned to the run that actually produced the ckpt.
  reset_lr: true
  skip_optimizer: true

  extend_iterations: 60000
  checkpoint_interval_iters: 1000
  val_interval_iters: 2000

  phase1_iterations: 999999
  sampling_weights_phase1:
    hypersim: 0.6
    midintrinsic: 0.4

loss:
  # ALL new levers explicitly OFF — this is the no-lever, step-matched baseline.
  lambda_alb_flat_lf: 0.0      # lever 1 OFF
  lambda_shadow_inv: 0.0       # lever 2 OFF
  lambda_shadow_explain: 0.0   # lever 2 OFF
