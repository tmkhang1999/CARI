# ════════════════════════════════════════════════════════════════════════════════════════
# V17.32 — HOMOGENEITY fine-tune (lever-2, LOW-λ sweep point: shadow_inv 0.5 / explain 0.25).
#
# WHY THIS RUN: v17.3 at lambda_shadow_inv=1.0 / explain=0.5 TRIPPED the kill-gate on ARAP —
# COLORED-subset C_arap regressed +16% vs base@50k (0.211 -> 0.245) and albedo si-RMSE rose
# (0.410 -> 0.428). The lever over-drove: the manufactured shadow field pushed real chroma out
# of albedo. Per the pre-registered sweep {0.5, 1.0, 2.0}, this run halves the lever (inv 0.5,
# explain 0.25 — keeping the original 2:1 inv:explain ratio) to find the point where the shadow
# leak is removed WITHOUT regressing colored constancy / accuracy.
#
# Everything else is IDENTICAL to v17.3 (same data mix, same FT recipe, same resume@50k) so the
# ONLY variable vs v17.3 is the lever magnitude — the sweep stays a clean 1-D ablation.
#
# GOAL (unchanged from v17.3): remove the residual HARD/soft shadow leak lever-1 (LF flatness)
# cannot reach. MANUFACTURE a 2nd observation: cast a KNOWN synthetic relight field (M, c) on
# every Hypersim sample, run a 2nd forward, require predicted albedo INVARIANT to it
# (criterion.shadow_invariance) + shading to EXPLAIN it at known magnitude (shadow_explain).
#
# RUN (saves to checkpoints/v17_32/, resumes FROM the shipped 50k weights — base untouched):
#   bash scripts/train.sh --version 17.32 --cuda 0 \
#       --resume checkpoints/v17_old/checkpoint_iter_50000.pth
#
# KILL-GATE (same as v17.3): after each 1k ckpt run eval_arap.py --constancy (+ eval_mid).
# KEEP the ckpt with the cleanest homogeneity that does NOT regress ARAP COLORED-subset C_arap
# or MID C_mat/Cast by more than ~10% vs base@50k, AND does not raise albedo si-RMSE.
#
# Inherits ALL of v17.yaml via `extends`, then applies only the deltas below.
# ════════════════════════════════════════════════════════════════════════════════════════
extends: 17

train:
  # ── Gentle FT-from-trained-ckpt (identical to v17.3) ──────────────────────────────────
  lr: 2.0e-5                 # ~1/10 of the 2e-4 baseline — refine, don't relearn
  use_cosine_lr: false       # CONSTANT lr (a resumed cosine would sit at eta_min)
  reset_lr: false             # override the decayed lr loaded from the 50k ckpt
  skip_optimizer: false       # fresh Adam moments for the FT phase

  extend_iterations: 60000
  checkpoint_interval_iters: 1000
  val_interval_iters: 2000

  # PIN the phase boundary past the horizon so NO phase switch fires mid-resume (loader inits on
  # phase1). The whole FT stays on the mix below — keeping MID raw pairs for CARI L_inv AND a
  # Hypersim majority so the shadow branch (Hypersim-gated) fires on most batches.
  phase1_iterations: 999999
  sampling_weights_phase1:
    hypersim: 0.6            # synthetic GT anchor + the rows the shadow self-sup runs on
    midintrinsic: 0.4        # real raw pairs = CARI L_inv (keeps colored-illuminant constancy)

loss:
  # ── THE lever-2 term, HALVED vs v17.3 (the only change) ───────────────────────────────
  lambda_shadow_inv: 0.5       # collapse-safe core, sweep point 0.5 (was 1.0 in v17.3)
  lambda_shadow_explain: 0.25  # matched half at the 2:1 ratio (was 0.5 in v17.3). If the
                               # kill-gate still flags it, drop explain to 0 to isolate inv.
  shadow_start_iter: 0         # we resume @50k → start immediately (already past warmup)
