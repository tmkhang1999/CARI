# ════════════════════════════════════════════════════════════════════════════════════════
# V17.31 — lever-2 ABLATION ARM: shadow-invariance ONLY (no L_shadow_explain).
#
# This is the A/B partner of v17.3. IDENTICAL in every way (same 50k base, same hypersim 0.6 /
# MID 0.4 mix, same lr / horizon / lambda_shadow_inv) EXCEPT lambda_shadow_explain=0. The ONLY
# variable vs v17.3 is the explain half, so (v17.3 − v17.31) isolates the MARGINAL effect of
# routing the manufactured shadow/tint INTO shading at its known magnitude:
#   • v17.3   = inv 1.0 + explain 0.5   (matched pair — the complete decomposition of rgb_s)
#   • v17.31  = inv 1.0 + explain 0.0   (albedo-invariance only; shading half left free)
# Expected reading: explain should tighten the colored axes (Cast_RMS / colored-C_arap) by
# pushing the tint c into shading; v17.31 tells us how much of lever-2's gain needs it.
#
# RUN (saves to checkpoints/v17_31/, resumes FROM the row-4 50k weights):
#   bash scripts/train.sh --version 17.31 --cuda 0 \
#       --resume checkpoints/v17_row4/checkpoint_iter_50000.pth
#
# Same KILL-GATE as v17.3 (MID C_mat/Cast + ARAP colored-subset C_arap, ~10% guard vs v17@50k).
# Inherits ALL of v17.yaml via `extends` (single-parent: cannot chain through v17_3.yaml, so the
# v17.3 deltas are duplicated here verbatim with explain zeroed).
# ════════════════════════════════════════════════════════════════════════════════════════
extends: 17

train:
  lr: 2.0e-5
  use_cosine_lr: false
  # POST-MORTEM 2026-07-02: the banked 60k run MEASURABLY trained with fresh Adam @ constant
  # 2e-5 (ckpt optimizer lr = 2e-5, vs base@50k's annealed 1e-7). false/false here would NOT
  # reproduce it: this arch matches base@50k, so the optimizer state would load and bring the
  # frozen 1e-7 lr with it. Values below aligned to the run that actually produced the ckpt.
  reset_lr: true
  skip_optimizer: true

  extend_iterations: 60000
  checkpoint_interval_iters: 1000
  val_interval_iters: 2000

  phase1_iterations: 999999
  sampling_weights_phase1:
    hypersim: 0.6
    midintrinsic: 0.4

loss:
  lambda_shadow_inv: 1.0       # SAME as v17.3
  lambda_shadow_explain: 0.0   # the only difference: explain OFF
  shadow_start_iter: 0
