# Base Configuration for Multi-Stage Intrinsic Decomposition

# Training settings
train:
  batch_size: 8
  num_workers: 4
  dataloader_seed: 42
  lr: 1.0e-5
  grad_accum_steps: 1
  grad_clip_max_norm: 1.0
  use_cosine_lr: true
  lr_eta_min: 1.0e-7
  log_interval: 50
  val_interval_iters: 2000
  checkpoint_interval_iters: 5000
  val_example_images: 2  # ignored if val_example_indices is set
  val_example_indices: [120, 200, 250]  # e.g., [100, 110, 120] to log specific samples; empty=use val_example_images count
  max_val_batches: null   # null=full val set, set small int (e.g. 10) for faster inline validation
  fast_val_metrics: false # false=exact skimage SSIM, true=faster proxy SSIM
  compute_val_losses: true # true=compute full criterion losses in val; false=metrics-only faster validation
  input_size: 384

  # Two-phase curriculum (global-iteration based)
  phase1_iterations: 20000
  phase2_iterations: 50000
  extend_iterations: 75000

  sampling_weights_phase1:
    hypersim: 1.0
    midintrinsic: 0.0

  sampling_weights_phase2:
    hypersim: 0.6
    midintrinsic: 0.4

# Model settings
model:
  version: 1
  backbone: convnextv2_base
  freeze_stages: [1, 2]
  z_channels: 1024
  pretrained: true
  num_seg_classes: 41

# Dataset settings
data:
  datasets: ['hypersim', 'midintrinsic']
  hypersim_root: '../datasets/hypersim'
  interiornet_root: '../datasets/interiornet'
  midintrinsic_root: '../datasets/MIDIntrinsics'

  # Data pipeline controls
  # cache_max_items / mid_cache_max_items:
  #   Bounded per-worker decode cache (LRU). 0 disables caching.
  #   Cache only stores decoded arrays; dataloader indices are never replayed.
  cache_max_items: 256
  mid_cache_max_items: 256
  val_cache_max_items: 256      # validation: use same as training for better cache hit rate
  val_num_workers: 6            # validation: increased from 2 to reduce data loading bottleneck
  crop_mode_train: 'random'   # random|center|hybrid
  crop_mode_val: 'center'     # random|center

  # Train subset controls for dataset-size ablations (0 => use full dataset)
  subset_seed: 42
  hypersim_train_max_images: 0
  midintrinsic_train_max_images: 0

  # Fixed scene-level split for reproducible ablations (V1/V2/V3/V4)
  hypersim_split_file: 'hypersim_split.json'
  hypersim_split_seed: 42
  hypersim_split_ratio: 0.9
  hypersim_strict_split: true

  # Hypersim I/O robustness controls
  hypersim_max_hdf5_retries: 1
  hypersim_skip_corrupt_samples: true


# Loss weights
loss:
  lambda_msg: 0.5
  lambda_tv: 0.1
  lambda_perceptual: 0.05 #0.05 
  lambda_dssim: 0.4 #0.4
  tv_type: 'segmentation' # options: 'segmentation', 'normals', null (disable TV)
  tv_target_classes: [1, 22] # NYU40 IDs, default wall(1) + ceiling(22)

# Paths  (relative to repo root when run from IR-IID/)
paths:
  checkpoint_dir: './checkpoints'
  log_dir: './logs'
  output_dir: './outputs'

