model:
  version: 17
  backbone: convnextv2_base
  z_channels: 1024
  freeze_stages: [1, 2]
  backbone_lr_multiplier: 1
  pretrained: true
  num_seg_classes: 41
  max_residual: 5.0

train:
  batch_size: 8
  input_size: 384
  num_workers: 6
  grad_accum_steps: 4
  grad_clip_max_norm: 1.0
  use_cosine_lr: true
  lr: 1.0e-5
  reset_lr: false
  skip_optimizer: false
  lr_eta_min: 1.0e-7
  log_interval: 500
  val_interval_iters: 2000
  checkpoint_interval_iters: 500
  val_example_images: 3
  val_example_indices: [25, 50, 75]
  max_val_batches: 100
  compute_val_losses: false
  seed: 42
  deterministic: true

  extend_iterations: 20000

  sampling_weights_phase1:
    hypersim: 1
    midintrinsic: 0
  sampling_weights_phase2:
    hypersim: 1
    midintrinsic: 0

data:
  datasets: ['hypersim']
  hypersim_strict_split: false
  subset_seed: 42
  hypersim_train_max_images: 0
  midintrinsic_train_max_images: 0

loss:
  # V17: no cascade branches, use direct albedo/shading/residual losses
  lambda_branch_a: 0.0
  lambda_branch_b: 0.0
  lambda_branch_c: 1.0
  lambda_branch_d: 1.0

  lambda_msg: 0.5
  lambda_ccr_edge: 0.0

  lambda_boundary: 0.0
  enable_dssim_a_d: true
  lambda_dssim: 0.2

  lambda_perceptual: 0

  # Reconstruction loss: the physics coupling constraint (I = A*S + R)
  # Active on all datasets regardless of GT availability
  lambda_recon: 0.5

  lambda_semvar: 0.0
  lambda_tv: 0.0
  lambda_edge: 0.0
  tv_type: 'none'
