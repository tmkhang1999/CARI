model:
  version: 17
  backbone: convnextv2_base
  z_channels: 1024
  freeze_stages: [1, 2]
  backbone_lr_multiplier: 1
  pretrained: true
  num_seg_classes: 41
  
train:
  batch_size: 8
  input_size: 384
  num_workers: 4
  grad_accum_steps: 4
  grad_clip_max_norm: 1.0
  use_cosine_lr: true
  
  # Two-phase curriculum
  phase1_iterations: 20000
  phase2_iterations: 15000
  extend_iterations: 40000
  
  # Data Mix for Phase 1
  sampling_weights_phase1:
    hypersim: 1.0
    midintrinsic: 0.0
    interiorverse: 0.0

  # Data Mix for Phase 2
  sampling_weights_phase2:
    hypersim: 0.6
    midintrinsic: 0.4
    interiorverse: 0.0
    
  reset_lr: false
  skip_optimizer: false
  log_interval: 500
  val_interval_iters: 2000
  checkpoint_interval_iters: 5000
  val_example_images: 3
  val_example_indices: [25, 50, 75]
  max_val_batches: 100
  compute_val_losses: false
  seed: 42
  deterministic: true

data:
  # Base paths for datasets
  hypersim_root: '../../../datasets/hypersim'
  midintrinsic_root: '../../../datasets/MIDIntrinsics'
  hypersim_strict_split: false
  subset_seed: 42
  hypersim_train_max_images: 0

loss:
  # Reconstruction (Always Active)
  lambda_recon: 1.0
  
  # Albedo (Always Active)
  lambda_a: 1.0
  lambda_dssim: 0.2
  
  # Shading (Always Active)
  lambda_s: 1.0
  ssi_warmup_iters: 3000
  
  # Residual (Hypersim Only)
  lambda_r: 1.0

  # MSG Weight
  lambda_msg: 1.0


