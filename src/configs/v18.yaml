model:
  version: 18

  # SD-2.1 weights via non-gated community mirror (stabilityai repo is gated).
  # NOTE: this is the *-base* (512, ε-prediction) variant; same UNet/VAE shapes
  # and 1024-dim cross-attn as SD-2.1, so warm-start is valid. The V18 scheduler
  # re-trains to v-prediction + zero-SNR (E2E-FT recipe), so ε vs v at init is fine.
  sd_pretrained: "Manojb/stable-diffusion-2-1-base"
  cross_attn_dim: 1024     # SD-2.x cross_attention_dim (SD-1.5 would be 768)
  null_seq_len: 77

  # Scheduler — v-prediction + zero-terminal-SNR + trailing (set in V18PGID).
  num_train_timesteps: 1000
  beta_start: 0.00085
  beta_end: 0.012

  # One-step: feed zeros as the noise latent (E2E-FT default → deterministic).
  noise_type: zeros
  # π-domain shading is a bounded [0,1] map → not gamma-encoded.
  shading_gamma: false
  pi_floor: 0.005

train:
  batch_size: 1          # bs1: full-FT AdamW (fp32 params+grads+moments ≈14GB fixed)
                         # leaves room for the 2× VAE-decode backward graph on 24GB.
                         # For bs2, install bitsandbytes and use 8-bit AdamW (−5GB).
  input_size: 384        # -> 48x48 latent
  lr: 3.0e-5             # one-step LR: UNANIMOUS across E2E-FT / GenPercept / Lotus.
                         # (3e-5 holds from eff-batch 32 → 128 in those refs, so no
                         #  linear-scaling halving needed.) NOT 8e-5 — that is the
                         #  MULTI-step Marigold-IID LR and does not apply to a 1-step model.
  weight_decay: 1.0e-2
  grad_accum_steps: 32   # eff batch 32 — matches E2E-FT/GenPercept/Marigold-IID exactly,
                         # so LR 3e-5 transfers verbatim. (grad_accum is memory-free at bs1.)
  grad_checkpointing: true
  # num_workers / grad_clip_max_norm / use_cosine_lr / lr_eta_min inherited from base.yaml

  # Curriculum — TWO PHASES, clean synthetic only (Hypersim + InteriorVerse).
  # Dataset sizes (train split): Hypersim 16,828 frames | InteriorVerse 47,537.
  #
  # *** UNITS: in train_v18.py, 1 "iteration" = ONE micro-batch (1 sample at bs1);
  #     the optimizer fires every grad_accum (=32) iterations. The reference papers
  #     report OPTIMIZER STEPS, so: opt_steps = iterations / 32. ***
  #
  # Budget = 20,000 optimizer steps @ eff-batch 32 = 640,000 sample-passes.
  #   This is the E2E-FT depth recipe VERBATIM (V18's one-step twin; GenPercept
  #   converges ~20k, Lotus runs 20k — all at LR 3e-5). 20,000 × 32 = 640,000 iters.
  #
  # P1 (0 → 128k iters = 4,000 opt steps): Hypersim only — ~7.6 HS epochs.
  #   Full A, S_d, R GT: learns joint decomposition + SSI shading on clean GT before
  #   IV's noisy pseudo-shading (m_diffuse=0) enters. (Refs use a fixed mix; this
  #   light Hypersim-first warmup is a V18 choice to seed the shading head.)
  # P2 (128k → 640k iters = 16,000 opt steps): 60/40 Hypersim+InteriorVerse.
  #   Hypersim : 512k × 0.6 / 16,828 ≈ 18 more epochs (total ~26)
  #   IV       : 512k × 0.4 / 47,537 ≈ 4.3 epochs (albedo diversity)
  #
  # FASTER FIRST RUN: these models improve fast early — for a quick pass, scale all
  #   three down 2× (phase1 64000 / phase2 320000 / extend 320000 = 10k opt steps).
  #
  # NOTE: weight dicts are DEEP-MERGED over base.yaml, which sets midintrinsic:0.4
  # in phase2 — explicit 0.0 required here or the loader builds + samples MID.
  phase1_iterations: 128000     # 4,000 opt steps  (Hypersim-only warmup)
  phase2_iterations: 640000     # 20,000 opt steps (end of mixed phase)
  extend_iterations: 640000     # = max_iters — the trainer reads THIS as the cap

  sampling_weights_phase1:
    hypersim: 1.0
    midintrinsic: 0.0

  sampling_weights_phase2:
    hypersim: 0.6
    midintrinsic: 0.0
    interiorverse: 0.4

  reset_lr: false
  skip_optimizer: false
  log_interval: 1600             # ~50 opt steps  → ~400 log points
  val_interval_iters: 4000      # ~1,000 opt steps → ~20 validations over the run
  checkpoint_interval_iters: 4000  # ~2,000 opt steps → 10 ckpts (keeps last 2; ~10GB each)
  val_example_images: 2
  val_example_indices: [50, 100, 150]
  max_val_batches: null
  val_sample_steps: 1            # ONE-STEP validation (the model's primary mode)
  # NOTE: train_v18.py does not yet apply a global seed / deterministic mode;
  # reproducibility currently comes from data.hypersim_split_seed (base.yaml).

data:
  hypersim_root: '../datasets/hypersim'
  midintrinsic_root: '../datasets/MIDIntrinsics'
  interiorverse_root: '../datasets/IndoorInverseRendering/interiorverse/interiorverse/interverse'
  hypersim_strict_split: false   # override base (true)
  use_mid_paired: false          # MID excluded → no paired invariance for V18
  # subset_seed / hypersim_train_max_images inherited from base.yaml

# Image-space physics loss suite — consumed by V17Loss on the DECODED A/S_d/R,
# ADAPTED to V18's 2-output analytic-residual model (R is NOT generated; it is
# R=(I−A·S_d)₊). Four V17 terms are dropped because that architecture makes them
# inert, redundant, or harmful (see documents/design/V18_PGID_design.md §5):
#   - lambda_edge       : no CCR head → 'ccr_edge_pred' never emitted; term never fires.
#   - lambda_alb_invariance : MID excluded + use_mid_paired=false → no second-light pass.
#   - lambda_r          : R is a deterministic fn of (A,S_d,I), not an independent
#                         output; L1(R,R_gt) only re-expresses "A·S_d≈A_gt·S_d_gt" →
#                         redundant with albedo+shading. (Also zeroes res_sparse, which
#                         is nested under w_r in V17Loss.)
#   - lambda_res_sparse : pushes A·S_d→I at EVERY pixel incl. speculars → forces the
#                         diffuse term to swallow specular highlights (leakage). Harmful.
#   - lambda_grad_decorr: GT-free Retinex prior; logged ≈0 in V17 (never bit) and modern
#                         supervised/diffusion IID SOTA (CD-IID, CRefNet, Marigold-IID)
#                         does not use it — albedo GT + SSI + diffuse-recon subsume it.
loss:
  # Reconstruction target mode — DIFFUSE (V18). Full-I recon is one-sided under analytic
  # R (recon_pred=max(A·S_d,I)); instead supervise the two-sided diffuse product
  # A·S_d vs A_gt·S_d_gt. Genuine recon on InteriorVerse (R≈0 ⇒ target=I), diffuse
  # render on Hypersim. This is the physics-in-the-loop signal V18 actually controls.
  recon_mode: diffuse

  # Albedo — primary signal, supervised on BOTH datasets (MSE + MSG + DSSIM).
  lambda_a: 1.0
  lambda_msg_albedo: 0.5
  lambda_dssim: 0.2

  # Diffuse shading in π-domain (SSI) — Hypersim-gated (m_diffuse=1); the only
  # source with true diffuse-shading GT. Plain-MSE warmup before SSI kicks in.
  lambda_s: 1.0
  lambda_msg_shading: 0.25
  ssi_warmup_iters: 32000        # ~1,000 opt steps (5% of run) of plain-MSE shading,
                                 # to seed absolute scale before switching to SSI.

  # Diffuse reconstruction L1(A·S_d, A_gt·S_d_gt) + MSG — the V18 physics signal.
  lambda_recon: 1.0
  lambda_msg_recon: 0.25

  # Dropped (see header). Kept explicit at 0.0 so intent is unambiguous.
  lambda_r: 0.0
  lambda_res_sparse: 0.0
  lambda_grad_decorr: 0.0

  # Small Marigold-style latent MSE on the x0 estimate. Stabilises early training
  # and keeps the SD prior on-manifold; set 0.0 for pure E2E-FT-style image loss.
  lambda_latent_anchor: 0.1
