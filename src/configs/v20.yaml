model:
  version: 20

  # ── Frozen DINOv2 backbone ─────────────────────────────────────────────────
  dino_variant: large
  dino_pretrained: true

  # ── DPT decoder (same width as V17 row-4) ─────────────────────────────────
  dpt_feat_ch: 512
  dpt_fusion_ch: 256
  dpt_out_ch: 256
  detail_ch: 64
  head_mid: 128
  pi_floor: 5.0e-3
  # ── Shading-first colored derive (FINAL, expert review 2026-06-23) ──────────────────
  # TWO heads on the DPT trunk: (1) gray shading g (full-res, luminance-skip), then (2) a dense
  # LOW-RES chroma field CONDITIONED on g.detach() — low-res ⇒ no texture (the constancy lever),
  # shading-first ⇒ closes the g↔chroma gauge that collapsed the old K-palette. Compose S = g·chroma ;
  # A = derive(I, S) (FP32, Q99) ; R = (I − A·S)₊ ANALYTIC (no head). See src/models/v20.py.
  # chroma_base_size: resolution of the colored illuminant field before upsampling (small = smoother).
  chroma_base_size: 48
  # REMOVED vs the K-palette MICC: base_size, num_illuminants, shade_base_size, use_albedo_refine —
  # palette+assignment (unidentifiable→green-collapse) replaced by the dense chroma field; multi-res
  # shading folded into one head (DPT already multi-scales); learned residual → analytic; refine cut.

train:
  # bs4/accum4: effective batch 16 — unchanged from bs2/accum8. Halving accum compensates for
  # doubling bs so samples-per-optimizer-update stays at 16 and lr=1.4e-4 remains correct.
  # Cosine fraction at any step = (step/accum) / (max_iters/accum) = step/max_iters — accum cancels,
  # so the LR schedule and all phase boundaries are unaffected on resume.
  # ⚠ VRAM: with full 24GB, bs4+CARI fits. At step 15k shadow activates (2nd forward) → watch OOM;
  # if it fires, drop back to bs2/accum8 and resume from the nearest checkpoint before step 15k.
  # input_size STAYS 512: matched train/eval res (we report at 512) → no mismatch penalty + the small
  # structure-metric (WHDR/si-RMSE) edge; constancy metrics are resolution-insensitive.
  batch_size: 4
  input_size: 512
  num_workers: 4
  lr: 1.4e-4               # √-scaled from 2.0e-4@batch32 → batch16: 2e-4·√(16/32)=1.4e-4 (Adam rule)
  grad_accum_steps: 4      # effective batch = batch_size(4) × 4 = 16
  grad_clip_max_norm: 1.0
  use_cosine_lr: true

  # ── V20 curriculum (train from scratch) ───────────────────────────────────
  # OpenRooms is OUT (server closed, 0 images downloaded). The cross-render L_inv
  # signal now comes from (a) Hypersim c·S colored-relight pairs (co-anchored by
  # exact Hypersim GT — cannot gray-collapse) from iter 3000, and (b) MID real
  # raw-color pairs. InteriorVerse stays out (multi-view, not multi-light).
  # Effective dataset: Hypersim (~50k images) + MID (~1k images). InteriorVerse and
  # OpenRooms are both weight=0 (no new data source enters after Phase 1).
  # NOTE: iters are in MICRO-BATCH (step) units; optimizer updates = iters / grad_accum_steps.
  # bs4/accum4: effective batch 16. RESCALED from the old bs2 schedule (30k/40k/80k): each step now
  # carries 2× the samples, so EVERY step-keyed count is HALVED to hold data exposure constant
  # (samples = bs × steps = 4 × 40000 = 160000, identical to the old 2 × 80000). Optimizer updates
  # = 40000/4 = 10000, also identical. This matches V17's bs4 schedule (15k/20k/40k) by construction.
  # Resume from bs2 iter_10000 (= 20k samples) via `--start-step 5000` (5000 × 4 = 20k samples) so the
  # cosine LR (fraction 0.125 in both) and phase timing stay continuous. See train_v20.py resume block.
  # CosineAnnealingLR T_max = ceil(max_iters/accum) auto-tracks it; train_v17.py:1524.
  # Phase 1 [0 .. 15k):  Hypersim only — anchor absolute albedo/shading color.
  #                       c·S colored pairs switch on at iter 1500 (=ssi_warmup) → synthetic L_inv.
  # Phase 2 [15k .. 20k): STILL Hypersim only; shadow/sun self-sup turns ON at 15k (shadow_start_iter).
  #                       Staggered BEFORE MID so base + shadow stabilise before the real-data shift —
  #                       phase-2 weights are intentionally identical to phase 1; the 15k boundary
  #                       exists for shadow_start, not a sampling change.
  # Phase 3 [20k .. 40k): MID at 30% — full CARI (Hypersim c·S + MID real raw-color pairs). This is
  #                       the thesis phase (real colored-illuminant constancy) → 20k steps.
  #                       Hypersim keeps the absolute-color anchor alive throughout.
  phase1_iterations: 15000
  phase2_iterations: 20000
  extend_iterations: 40000

  sampling_weights_phase1:
    hypersim: 1.0
    midintrinsic: 0.0

  sampling_weights_phase2:
    hypersim: 1.0
    midintrinsic: 0.0

  sampling_weights_phase3:
    hypersim: 0.7
    midintrinsic: 0.3

  reset_lr: false
  skip_optimizer: false
  log_interval: 1000
  val_interval_iters: 2500       # halved with the bs2→bs4 step rescale (same sample-space cadence)
  checkpoint_interval_iters: 1000  # halved with the bs2→bs4 step rescale
  val_example_images: 3
  val_example_indices: [50, 125, 200]
  max_val_batches: null
  compute_val_losses: true
  seed: 42
  deterministic: true

data:
  hypersim_root: '../datasets/hypersim'
  midintrinsic_root: '../datasets/MIDIntrinsics'
  hypersim_strict_split: false
  subset_seed: 42
  hypersim_train_max_images: 0

  # CARI: MID cross-render pairs (real colored-illuminant variation)
  # raw_color_pair=true: extra frame is un-WB'd so L_inv must be invariant to real illuminant shifts.
  # Primary frame stays WB'd (matches pseudo-GT albedo).
  use_mid_paired: true
  mid_pair_mode: raw
  mid_raw_color_pair: true
  mid_chromatic_aug: false  # raw signal is the real thing; synthetic tint HURT (eval 2026-06-15)

  # Hypersim c*S colored-relight pairs: fraction of Hypersim samples emitted as (rgb, c*rgb) pairs
  # so L_inv reaches Hypersim's distribution and fixes the yellow-cast leak.
  # Iteration-gated: turns on at start_iter (matched to ssi_warmup) so the relight signal begins
  # the moment shading SSI is online — corrects the leak as it forms rather than at the phase boundary.
  hypersim_color_pair_prob: 0.5
  hypersim_color_pair_start_iter: 1500   # halved with bs2→bs4 step rescale (= ssi_warmup_iters)
  hypersim_color_tint_min: 0.8
  hypersim_color_tint_max: 1.25

loss:
  # ── Albedo ─────────────────────────────────────────────────────
  lambda_a: 1.0
  albedo_l1: true            # L1 data term (not MSE) — sharper; matches IDT/CD-IID/CRefNet
  lambda_dssim: 0.2
  lambda_msg_albedo: 0.5
  lambda_a_chroma: 0.4       # ↑0.2→0.4: prices albedo HUE error (the Cast axis) independent of brightness
  # ↓0.5→0.2: chroma_field_gt is the WB-primary frame's chroma = ≈NEUTRAL on white Hypersim/WB MID,
  # so a high weight here pulls the chroma head to gray every step → desaturates albedo + caps the
  # cast metric. The COLORED signal now comes from lambda_chroma_field_pair on the un-WB pair frame.
  lambda_chroma_field: 0.2   # neutral anchor (low); colored target rides on the CARI pair below
  lambda_chroma_field_pair: 0.4  # colored-illuminant chroma on the un-WB / c·rgb PAIR frame (thesis lever)

  # ── Shading SSI (π-domain, Hypersim-gated via M_diffuse) ───────────────
  lambda_s: 1.0
  ssi_warmup_iters: 1500    # halved with bs2→bs4 step rescale (was 3000 @ bs2)
  lambda_msg_shading: 0.5
  # Absolute scale pin on g (anti-collapse): non-aligned MSE d_g vs π(gray(S_c)) closes the free
  # shading-scale gauge the scale-shift SSI leaves open. Low weight — the SSI still owns the shape.
  lambda_shade_abs: 0.1

  # ── Derive anneal ──────────────────────────────────────────
  # Ramp Q99 derive scale 0.8/q99 → identity (a=I/S) over this many steps after
  # ssi_warmup. Keeps gradient to S alive during warmup; at steady state a·S→I
  # so analytic R is sparse and the 0.8 target stops fighting albedo-L1.
  derive_anneal_iters: 3000   # halved with bs2→bs4 step rescale (was 6000 @ bs2)
  # Cap < 1.0 so training never sits on the pure clamp(I/S,0,1) rail (∂a/∂S=0 → gradient-death →
  # the 15k collapse). Eval still uses anneal=1.0 (v20.forward default); this is training-only.
  derive_anneal_cap: 0.9

  # ── Reconstruction (diffuse mode: two-sided a·S vs A*·S_d anti-collapse anchor) ────
  # recon_pred = a·S (NO residual) vs A*·S_d → genuine two-sided (not the a·S+R≡I tautology that
  # leaves S a free gauge). It is the WALL that pins the a·S product off zero: where a=clamp(I/S)
  # saturates it pushes S up. Hypersim-gated in the loss (S_d only real there). MANDATORY anti-collapse.
  recon_mode: diffuse
  lambda_recon: 0.3
  lambda_msg_recon: 0.15

  # ── DINOv2 material consistency (GT-free, real-photo capable) ──────────
  # chroma term flattens coloured-cast leak; log-luminance term (DINOv2-gated
  # within-material intensity flatness) flattens the shading ramp on real photos.
  lambda_mat_consist: 0.15
  mat_sim_threshold: 0.0
  mat_intensity_weight: 0.4

  # ── CARI cross-render supervision ───────────────────────────────────
  # Active once paired samples are present (m_invariant=1.0 gates the loss):
  # Hypersim c·S pairs from iter 1500, MID real pairs from Phase 2.
  lambda_alb_invariance: 0.5

  # ── Shadow + sunlight invariance self-supervision ────────────────────
  # CUT (was 0.5): shadow_explain is a log-difference between two shadings from the SAME network →
  # scale-gauge-blind AND it rewards an input-insensitive (constant/floored) g → it is what tipped
  # the free shading-scale gauge into the 15k collapse. The constancy engine is the (working)
  # Hypersim c·S + MID raw-pair CARI L_inv + the colored chroma-field-pair target. Re-introduce
  # HARD-SHADOW removal later as `lambda_shadow_inv` (aligned albedo invariance = collapse-safe),
  # deferred to Phase 3 and ONLY after the anchor proves it holds 15k→16k. shadow_inv stays 0 here.
  lambda_shadow_explain: 0.0
  lambda_shadow_inv: 0.0
  shadow_start_iter: 20000   # if shadow_inv is later enabled, start it in Phase 3, post-anchor

