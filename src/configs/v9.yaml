# Stage 1 V9 — Unified Spatial Feature Modulation (SFM)
model:
  version: 9
  backbone: convnextv2_base
  z_channels: 1024
  freeze_stages: [1, 2]
  pretrained: true
  num_seg_classes: 41

train:
  batch_size: 8
  num_workers: 6
  grad_accum_steps: 4
  grad_clip_max_norm: 1.0
  use_cosine_lr: true
  lr_eta_min: 1.0e-7
  log_interval: 500
  val_interval_iters: 1000
  checkpoint_interval_iters: 1000
  val_example_images: 3
  seed: 42
  deterministic: false

  phase1_iterations: 10000
  phase2_iterations: 20000
  extend_iterations: 20000

  sampling_weights_phase1:
    hypersim: 1.0
    midintrinsic: 0.0
  sampling_weights_phase2:
    hypersim: 1.0
    midintrinsic: 0.0

data:
  datasets: ['hypersim']
  subset_seed: 42
  hypersim_train_max_images: 0
  midintrinsic_train_max_images: 0

loss:
  lambda_branch_a: 2.0
  lambda_branch_b: 1.0
  lambda_branch_c: 1.0
  lambda_branch_d: 1.0

  lambda_msg: 0.8 
  lambda_perceptual: 0.05
  lambda_dssim: 0.4

  lambda_tv: 0.05
  
  tv_type: 'segmentation'
  tv_target_classes: [1, 2, 22]
