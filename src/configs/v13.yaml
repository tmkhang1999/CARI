# Stage 1 V12_single — Hypersim only
# - Set all loss weights to 0 except MSE (1.0) and MSG (0.5)
# - Focus purely on gradient alignment and magnitude

model:
  version: 13
  backbone: convnextv2_base
  z_channels: 1024
  freeze_stages: [1, 2]
  backbone_lr_multiplier: 1
  pretrained: true
  num_seg_classes: 41

train:
  batch_size: 4
  input_size: 384
  num_workers: 6
  grad_accum_steps: 8
  grad_clip_max_norm: 1.0
  use_cosine_lr: false
  lr: 1.0e-5
  lr_eta_min: 1.0e-7
  log_interval: 500
  val_interval_iters: 1000
  checkpoint_interval_iters: 500
  val_example_images: 3
  val_example_indices: [25, 50,75] #[120, 200, 300]
  max_val_batches: 100
  compute_val_losses: false
  seed: 42
  deterministic: true

  phase1_iterations: 10000
  phase2_iterations: 15000
  extend_iterations: 20000

  sampling_weights_phase1:
    hypersim: 1
    midintrinsic: 0
  sampling_weights_phase2:
    hypersim: 1
    midintrinsic: 0

data:
  datasets: ['hypersim']
  validate_midintrinsic: false
  hypersim_strict_split: false
  subset_seed: 42
  hypersim_train_max_images: 0
  midintrinsic_train_max_images: 0

loss:
  lambda_branch_a: 2.0
  lambda_branch_b: 1.0
  lambda_branch_c: 1.0
  lambda_branch_d: 1.0

  # 1. CORE PHYSICS & EDGES
  lambda_msg: 0.5           # Keeps boundaries sharp.
  
  # 2. THE SMART ROOM CLEANER (Replaces SemVar!)
  lambda_boundary: 0.05     # Flattens albedo ONLY where CCR says there is no edge.

  # 3. TEXTURE & COLOR
  enable_dssim_a_d: false   # Shading stays smooth!
  lambda_dssim: 0.4         # Albedo keeps local micro-textures (like carpets).
  lambda_perceptual: 0.05   # With Gamma Fix: Restores vibrant cross-channel colors.

  # 4. THE DEAD WEIGHT (Killed by your logic)
  lambda_recon: 0.0         # Killed: Violates I = A*S + R
  lambda_semvar: 0.0        # Killed: Destroys multi-material objects (Shoji screens)
  lambda_tv: 0.0            # Killed: Smears edges
  lambda_edge: 0.0          # Killed: Canny noise trap
  tv_type: 'none'