# Stage 1 V4 — V1 + segmentation-guided SPADE in Dec C
# Uses segmentation map for model guidance (SPADE) and TV loss masking.
model:
  version: 4
  backbone: convnextv2_base
  z_channels: 1024
  freeze_stages: [1, 2]
  pretrained: true
  num_seg_classes: 41

train:
  batch_size: 8
  num_workers: 6

  log_interval: 500
  val_interval_iters: 1000
  checkpoint_interval_iters: 1000

  val_example_images: 3

  phase1_iterations: 10000
  phase2_iterations: 10000
  extend_iterations: 15000
  
  sampling_weights_phase1:
    hypersim: 1.0
    midintrinsic: 0.0
  sampling_weights_phase2:
    hypersim: 1.0
    midintrinsic: 0.0

data:
  datasets: ['hypersim']
  subset_seed: 42
  hypersim_train_max_images: 0
  midintrinsic_train_max_images: 0

loss:
  tv_type: 'segmentation' # or 'normals', or null to disable TV
  tv_target_classes: [1, 22] # NYU40 wall + ceiling
