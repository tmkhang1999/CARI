# Stage 1 V4 — CCR Guidance + SPADE Semantic Normalization
# Adds CCREncoder (6ch) + ResidualAttention in Dec C + SPADE.
# Requires normals + seg in the batch.
model:
  version: 4
  backbone: convnextv2_base
  z_channels: 1024
  freeze_stages: [1, 2]
  pretrained: true
  num_seg_classes: 41

train:
  batch_size: 8
  log_interval: 50
  val_interval_iters: 2000
  checkpoint_interval_iters: 5000
  phase1_iterations: 50000
  phase2_iterations: 50000
  extend_iterations: 75000
  sampling_weights_phase1:
    hypersim: 1.0
    midintrinsic: 0.0
  sampling_weights_phase2:
    hypersim: 1.0
    midintrinsic: 0.0

data:
  datasets: ['hypersim']
  subset_seed: 42
  hypersim_train_max_images: 0
  midintrinsic_train_max_images: 0
