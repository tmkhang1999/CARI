# ════════════════════════════════════════════════════════════════════════════════════════
# V17.29 — TABLE-B ROW: 3D-FRONT pairs ALONE (zero levers), from the NEW genuine-CARI
# base v17_44@40k, 40k→60k.
#
# RETARGETED 2026-07-09: the old "v17_44/checkpoint_iter_50000.pth" base was the RELOCATED
# pre-fix v17_old@50k (CARI never fired) and has moved to v17_old/checkpoint_iter_50000_44.pth.
# This row now resumes the post-fix v17_44@40k and is read at 60k against v17_20 (ctrl),
# v17_23 (levers), and v17_33 (levers+front3d), all matched at +20k.
#
# ROLE (run 2 of the front3d plan, panel doc §10; gated on the v17_28 probe passing): the
# clean single-variable attribution of the DATASET. Identical to the v17_23 recipe in
# resume / lr / horizon, but ALL Table-B lever lambdas are explicitly 0 — the only change
# vs base@50k's continued training is front3d in the mix. Paired with v17_33 (front3d +
# combo levers) this gives the thesis ablation:
#   base@50k → +front3d (this row) → +front3d+levers (v17_33)
# and the row deltas separate "what the dataset buys" from "what the levers buy on top".
#
# The FINAL/SOTA-comparison model is NOT a separate training run: it is whichever row wins
# at matched steps under the kill gates (exactly how B_combo_70k became the ship baseline).
# If the winner later warrants a scale-up (full 3D-FRONT train split ~6.8k houses, longer
# horizon), clone THAT winning config — do not edit this row after it has been measured.
#
# MIX: same 4-dataset mix as v17_28 so the probe and the Table-B rows stay comparable on
# the data axis (see v17_28 header for the mix rationale and the interiorverse caveat).
#
# RESUME semantics: true/true is REQUIRED here (unlike v17_28) — the shipped base@50k
# checkpoint's saved optimizer carries the fully-annealed lr 1e-7, so loading it would run
# effectively frozen. true/true = fresh Adam @ constant 2e-5, which is what every banked
# Table-B row measurably trained with (post-mortem 2026-07-02).
#
# STATUS 2026-07-12: PROMOTED to LEADING "Ours" candidate. eval25 (tableB_ours25) showed the
# lever stack at lambda_alb_flat_lf=4.0 washes out the albedo on low-chroma scenes (pale veil,
# MAW intensity 0.255→0.464 = kill-gate FAIL, visible in arap_vis/B_combo*/camera.png) while
# front3d's marginal effect is clean (+3..8% on all ARAP constancy axes, no washout). This row
# answers whether the front3d gain survives WITHOUT the levers. Read at 60k against v17_20/23/33
# and the parallel v17_34 (gentle-lever variant, flat_lf=1.5).
# MIX 0.30 (2026-07-12, supersedes the 0.20-matched plan): front3d dose raised 0.20→0.30,
# taken ENTIRELY from InteriorVerse (0.24→0.14) — the IV-importance belief was debunked
# 2026-07-07 (old base had ZERO IV; the "IV-drop caused drift" post-mortem compared against
# a control that never had IV), while hyp (GT anchor + shadow self-sup host) and MID (the
# REAL-pair CARI signal) stay untouched. Costs, accepted knowingly: (29−20) carries a
# secondary IV-reduction component; front3d reuse ≈10-15 epochs of 2374 views (watch the
# front3d loss curve for memorization). v17_34 uses the SAME mix so (34−29) stays a pure
# levers-on/off contrast.
# ⚠ RELAUNCH REQUIRED: the first 29 attempt ran 40k→41k at the old 0.20 mix. Kill it, clear
# checkpoints/v17_29/ (else auto-resume continues the 0.20-contaminated 41k ckpt), relaunch
# fresh from base@40k.
#
# RUN (saves to checkpoints/v17_29/):
#   bash scripts/train.sh --version 17.29 --cuda 0 --resume checkpoints/v17_44/checkpoint_iter_40000.pth
# ════════════════════════════════════════════════════════════════════════════════════════
extends: 17

train:
  lr: 2.0e-5
  use_cosine_lr: false
  reset_lr: false 
  skip_optimizer: false

  extend_iterations: 60000     # read at 60k (+20k from base@40k), matched with v17_20/23/33
  checkpoint_interval_iters: 1000
  val_interval_iters: 2000

  # Finetune from a fixed base — one constant mix, no phase ramp. The resume step (>=40k) is
  # past the inherited phase2 boundary, so phase3 is the active mix from step one.
  # CRITICAL: this mix includes front3d; without moving it here (the old phase1_iterations:999999
  # sentinel no longer suppresses the switch), the run would inherit v17.yaml's phase3 mix
  # and silently train with ZERO front3d.
  sampling_weights_phase3:
    hypersim: 0.3
    midintrinsic: 0.3
    interiorverse: 0.15
    front3d: 0.25

data:
  front3d_root: '../datasets/front3d_iid'

loss:
  # Levers explicitly OFF (they default off in v17.yaml; stated here so the row is
  # self-documenting): this row measures the dataset, nothing else.
  lambda_alb_flat_lf: 0.0
  lambda_shadow_inv: 0.0
  lambda_shadow_explain: 0.0
