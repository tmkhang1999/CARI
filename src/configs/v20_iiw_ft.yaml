# ════════════════════════════════════════════════════════════════════════════════════════
# V20 → IIW WHDR ordinal-hinge JOINT fine-tune (POST-baseline).
#
# Run AFTER the 80k V20 baseline finishes:
#   python src/train_v20.py --version 20 --config src/configs/v20_iiw_ft.yaml --resume latest --device cuda
#   (or via scripts/train.sh if it forwards --config)
#
# What it does: continues from the 80k checkpoint for a SHORT, GENTLE pass that adds ONE new
# term — the IIW ordinal hinge (WHDR lever) on a dedicated IIW batch — while keeping the main
# Hypersim+MID constancy losses (albedo-L1, gray-SSI, CARI L_inv, mat_consist) ON. Joint, not
# pure-IIW → no catastrophic forgetting of the colored-illuminant constancy contribution.
#
# FAIRNESS: IIW train split = COMPLEMENT of the eval's test split (ids[0::5]) → zero leakage.
# Report BOTH the 80k baseline WHDR and this fine-tuned WHDR, and group comparison tables by
# protocol (mark this column "†fine-tuned on IIW-train"); never compare it head-to-head against
# a zero-shot method (Marigold) without that label. See src/data/iiw_dataset.py.
#
# AFTER FT: run tests/eval/eval_iiw.py AND tests/eval/eval_mid_constancy.py on each checkpoint;
# keep the one with the best WHDR that does NOT regress MID C_mat / Cast (the contribution).
#
# Inherits ALL of v20.yaml via `extends`, then applies only the deltas below.
# ════════════════════════════════════════════════════════════════════════════════════════
extends: 20

train:
  lr: 2.0e-5                 # gentle: ~1/7 of baseline 1.4e-4 — refine orderings, don't relearn
  use_cosine_lr: false       # CONSTANT lr: a resumed cosine sits at ~eta_min by step 80k (defeats reset_lr)
  reset_lr: true             # override the decayed LR loaded from the 80k checkpoint
  skip_optimizer: true       # fresh Adam moments for the FT phase
  iiw_batch_size: 2          # IIW images per step for the ordinal branch (its own forward)

  # Short FT horizon. Counts are MICRO-BATCHES (bs2/accum8). Resume @80000 → +8000 steps ≈ 1000
  # optimizer updates. Bump extend_iterations if WHDR is still improving AND constancy holds.
  extend_iterations: 88000
  # Pin phase boundaries to the end so NO phase switch fires mid-resume: the run stays on the
  # "phase 1" loader the entire FT, and we set that loader's mix below to keep MID in the batch
  # (so CARI L_inv keeps the constancy contribution anchored during fine-tuning).
  phase1_iterations: 88000
  phase2_iterations: 88000
  sampling_weights_phase1:
    hypersim: 0.6
    midintrinsic: 0.4

  val_interval_iters: 1000        # watch Hypersim albedo/shading val so constancy doesn't drift
  checkpoint_interval_iters: 1000 # frequent ckpts → pick best WHDR-vs-constancy trade-off post-hoc

loss:
  lambda_ordinal_iiw: 1.0    # THE WHDR lever (the only new term). Tune in {0.5, 1.0, 2.0} if needed.
  ordinal_margin: 0.10       # WHDR δ — matches tests/eval/eval_iiw.py
  # Turn the shadow/sun aug branch OFF: it is already trained in by 80k, and dropping it saves the
  # 3rd forward so the IIW forward fits the memory budget. Constancy losses stay ON (inherited).
  lambda_shadow_explain: 0.0
  lambda_shadow_inv: 0.0
