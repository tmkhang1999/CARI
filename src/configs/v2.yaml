# Stage 1 V2 — Adapter Pyramid Cross-Decoder
# Adds ShadingAdapter / ColorfulAdapter / AlbedoAdapter on top of V1.
model:
  version: 2
  backbone: convnextv2_base
  z_channels: 1024
  freeze_stages: [1, 2]
  pretrained: true

train:
  batch_size: 8
  num_workers: 6

  log_interval: 50
  val_interval_iters: 500
  checkpoint_interval_iters: 1000

  phase1_iterations: 10000
  phase2_iterations: 10000
  extend_iterations: 15000
  sampling_weights_phase1:
    hypersim: 1.0
    midintrinsic: 0.0
  sampling_weights_phase2:
    hypersim: 1.0
    midintrinsic: 0.0

data:
  datasets: ['hypersim']
  subset_seed: 42
  hypersim_train_max_images: 0
  midintrinsic_train_max_images: 0
